<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المشرف - رفع نتائج الباكلوريا 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-800 border border-slate-700/80 p-8 rounded-3xl shadow-2xl text-center space-y-6">
        <div class="space-y-2">
            <span class="bg-purple-500/10 text-purple-400 font-bold px-3 py-1 rounded-full text-xs">لوحة تحكم الإدارة 🔐</span>
            <h2 class="text-2xl font-black text-slate-100">رفع ملف الـ Excel للنتائج</h2>
            <p class="text-xs text-slate-400">يرجى اختيار ملف نتائج الباكلوريا بصيغة (.xlsx) للبدء في معالجة ومطابقة الأعمدة.</p>
        </div>
        
        <!-- عرض رسائل النظام إن وجدت -->
        {% if messages %}
            <div class="space-y-2">
                {% for message in messages %}
                    <div class="p-3 text-xs font-bold rounded-xl {% if message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20{% else %}bg-green-500/10 text-green-400 border border-green-500/20{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div class="border-2 border-dashed border-slate-600 rounded-2xl p-6 hover:border-purple-500 transition cursor-pointer bg-slate-900/50">
                <input type="file" name="excel_file" accept=".xlsx, .xls" required class="block w-full text-sm text-slate-400 file:ml-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700 cursor-pointer">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-3.5 rounded-xl transition tracking-wide text-sm shadow-lg shadow-purple-900/20">
                تحميل الملف والانتقال لخطوة المطابقة ➡️
            </button>
        </form>
    </div>

</body>
</html>
